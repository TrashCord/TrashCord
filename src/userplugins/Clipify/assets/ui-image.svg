<svg xmlns="http://www.w3.org/2000/svg" width="768" height="560" viewBox="0 0 768 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="764" height="556" rx="10" fill="#313338" stroke="#1e1f22" stroke-width="2"/>

  <!-- header -->
  <text x="24" y="36" fill="#f2f3f5" font-size="19" font-weight="700">Image editor</text>
  <text x="738" y="36" fill="#b5bac1" font-size="18">✕</text>
  <line x1="24" y1="52" x2="744" y2="52" stroke="#3f4147" stroke-width="1"/>

  <!-- layout switch -->
  <rect x="312" y="64" width="222" height="26" rx="8" fill="#1e1f22"/>
  <text x="332" y="81" fill="#949ba4" font-size="12" font-weight="600">Simple</text>
  <text x="392" y="81" fill="#949ba4" font-size="12" font-weight="600">Moderate</text>
  <rect x="462" y="67" width="68" height="20" rx="6" fill="#5865f2"/>
  <text x="471" y="81" fill="#ffffff" font-size="12" font-weight="600">Advanced</text>

  <!-- tools -->
  <rect x="270" y="100" width="228" height="32" rx="9" fill="#1e1f22"/>
  <text x="296" y="121" fill="#949ba4" font-size="13" font-weight="600">▢ Crop</text>
  <text x="360" y="121" fill="#949ba4" font-size="13" font-weight="600">▭ Resize</text>
  <rect x="432" y="103" width="62" height="26" rx="6" fill="#5865f2"/>
  <text x="446" y="121" fill="#fff" font-size="13" font-weight="600">◉ Censor</text>

  <!-- canvas -->
  <rect x="24" y="144" width="720" height="248" rx="8" fill="#000000"/>
  <rect x="196" y="152" width="376" height="232" fill="#2b2f36"/>
  <!-- a couple of "subjects" -->
  <circle cx="300" cy="230" r="40" fill="#3a3f47"/>
  <rect x="380" y="270" width="150" height="70" rx="6" fill="#3a3f47"/>
  <!-- blur box censor -->
  <rect x="262" y="188" width="80" height="84" fill="#5865f2" fill-opacity="0.20" stroke="#5865f2" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="266" y="192" width="72" height="76" fill="#9aa0e6" fill-opacity="0.55"/>
  <text x="246" y="300" fill="#72767d" font-size="11">blur box</text>
  <!-- brush stroke censor -->
  <path d="M392 298 q40 -28 80 -6 q40 22 78 -4" fill="none" stroke="#9aa0e6" stroke-opacity="0.7" stroke-width="26" stroke-linecap="round"/>
  <path d="M392 298 q40 -28 80 -6 q40 22 78 -4" fill="none" stroke="#5865f2" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round"/>
  <text x="470" y="338" fill="#72767d" font-size="11">brush stroke</text>
  <!-- delete handle on a box -->
  <circle cx="344" cy="186" r="9" fill="#ed4245"/>
  <text x="340" y="190" fill="#fff" font-size="11">✕</text>

  <!-- censor controls -->
  <rect x="16" y="400" width="728" height="36" rx="8" fill="#2b2d31" stroke="#3f4147"/>
  <rect x="24" y="406" width="92" height="26" rx="8" fill="#1e1f22"/>
  <rect x="27" y="409" width="42" height="20" rx="6" fill="#5865f2"/>
  <text x="38" y="423" fill="#fff" font-size="11" font-weight="600">Blur</text>
  <text x="74" y="423" fill="#949ba4" font-size="11" font-weight="600">Pixel</text>

  <rect x="128" y="406" width="92" height="26" rx="8" fill="#1e1f22"/>
  <text x="142" y="423" fill="#949ba4" font-size="11" font-weight="600">Box</text>
  <rect x="174" y="409" width="42" height="20" rx="6" fill="#5865f2"/>
  <text x="183" y="423" fill="#fff" font-size="11" font-weight="600">Brush</text>

  <text x="240" y="423" fill="#949ba4" font-size="11" font-weight="700">INT</text>
  <rect x="272" y="416" width="96" height="6" rx="3" fill="#4e5058"/><rect x="272" y="416" width="58" height="6" rx="3" fill="#5865f2"/><circle cx="330" cy="419" r="7" fill="#fff"/><text x="378" y="423" fill="#f2f3f5" font-size="11" font-family="monospace">60</text>

  <text x="416" y="423" fill="#949ba4" font-size="11" font-weight="700">BRUSH</text>
  <rect x="464" y="416" width="96" height="6" rx="3" fill="#4e5058"/><rect x="464" y="416" width="40" height="6" rx="3" fill="#5865f2"/><circle cx="504" cy="419" r="7" fill="#fff"/><text x="570" y="423" fill="#f2f3f5" font-size="11" font-family="monospace">28</text>

  <rect x="612" y="406" width="30" height="26" rx="6" fill="#2b2d31" stroke="#3f4147"/>
  <text x="622" y="423" fill="#dbdee1" font-size="13">↺</text>
  <rect x="650" y="406" width="84" height="26" rx="6" fill="#2b2d31" stroke="#3f4147"/>
  <text x="664" y="423" fill="#dbdee1" font-size="12" font-weight="600">Clear all</text>

  <!-- output (advanced) -->
  <rect x="16" y="440" width="728" height="34" rx="8" fill="#2b2d31" stroke="#3f4147"/>
  <text x="24" y="458" fill="#949ba4" font-size="11" font-weight="700">OUTPUT</text>
  <rect x="84" y="444" width="200" height="26" rx="8" fill="#1e1f22"/>
  <text x="98" y="461" fill="#949ba4" font-size="11" font-weight="600">Auto</text>
  <rect x="138" y="447" width="42" height="20" rx="6" fill="#5865f2"/><text x="150" y="461" fill="#fff" font-size="11" font-weight="600">JPEG</text>
  <text x="190" y="461" fill="#949ba4" font-size="11" font-weight="600">PNG</text>
  <text x="232" y="461" fill="#949ba4" font-size="11" font-weight="600">WebP</text>
  <text x="306" y="461" fill="#949ba4" font-size="11" font-weight="700">QUALITY</text>
  <rect x="368" y="454" width="120" height="6" rx="3" fill="#4e5058"/><rect x="368" y="454" width="100" height="6" rx="3" fill="#5865f2"/><circle cx="468" cy="457" r="7" fill="#fff"/><text x="500" y="461" fill="#f2f3f5" font-size="11" font-family="monospace">92</text>

  <!-- info -->
  <text x="24" y="492" fill="#72767d" font-size="12">Original 1920×1080 · Output 1280×720 (cropped) · 2 censor marks</text>

  <!-- footer / actions -->
  <line x1="0" y1="508" x2="768" y2="508" stroke="#1e1f22" stroke-width="2"/>
  <rect x="0" y="508" width="768" height="52" fill="#2b2d31"/>
  <rect x="560" y="520" width="130" height="32" rx="6" fill="#5865f2"/>
  <text x="582" y="541" fill="#fff" font-size="13" font-weight="600">Apply &amp; send</text>
  <text x="704" y="541" fill="#b5bac1" font-size="13" font-weight="600">Cancel</text>
</svg>
