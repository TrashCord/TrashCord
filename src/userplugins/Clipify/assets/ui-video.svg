<svg xmlns="http://www.w3.org/2000/svg" width="768" height="600" viewBox="0 0 768 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- modal -->
  <rect x="2" y="2" width="764" height="596" rx="10" fill="#313338" stroke="#1e1f22" stroke-width="2"/>

  <!-- header -->
  <text x="24" y="36" fill="#f2f3f5" font-size="19" font-weight="700">Trim editor</text>
  <text x="738" y="36" fill="#b5bac1" font-size="18">✕</text>
  <line x1="24" y1="52" x2="744" y2="52" stroke="#3f4147" stroke-width="1"/>

  <!-- layout switch -->
  <text x="252" y="80" fill="#949ba4" font-size="11" font-weight="700" letter-spacing="1">LAYOUT</text>
  <rect x="312" y="66" width="222" height="26" rx="8" fill="#1e1f22"/>
  <text x="332" y="83" fill="#949ba4" font-size="12" font-weight="600">Simple</text>
  <text x="392" y="83" fill="#949ba4" font-size="12" font-weight="600">Moderate</text>
  <rect x="462" y="69" width="68" height="20" rx="6" fill="#5865f2"/>
  <text x="471" y="83" fill="#ffffff" font-size="12" font-weight="600">Advanced</text>

  <!-- stage -->
  <rect x="24" y="104" width="720" height="180" rx="8" fill="#000000"/>
  <rect x="276" y="116" width="216" height="156" rx="2" fill="#20242b"/>
  <!-- crop box -->
  <rect x="312" y="142" width="150" height="104" fill="none" stroke="#5865f2" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="328" y="290" fill="#72767d" font-size="11">⤡ drag a box on the video to crop / zoom</text>

  <!-- readouts -->
  <g font-size="11" font-weight="700">
    <rect x="24" y="296" width="170" height="48" rx="8" fill="#2b2d31" stroke="#5865f2"/>
    <text x="36" y="316" fill="#949ba4">START</text><text x="36" y="336" fill="#5865f2" font-size="15" font-family="monospace">00:00.000</text>
    <rect x="204" y="296" width="170" height="48" rx="8" fill="#2b2d31" stroke="#5865f2"/>
    <text x="216" y="316" fill="#949ba4">END</text><text x="216" y="336" fill="#5865f2" font-size="15" font-family="monospace">00:12.500</text>
    <rect x="384" y="296" width="170" height="48" rx="8" fill="#2b2d31" stroke="#3f4147"/>
    <text x="396" y="316" fill="#949ba4">CURRENT</text><text x="396" y="336" fill="#f2f3f5" font-size="15" font-family="monospace">00:03.200</text>
    <rect x="564" y="296" width="170" height="48" rx="8" fill="#2b2d31" stroke="#3f4147"/>
    <text x="576" y="316" fill="#949ba4">DURATION</text><text x="576" y="336" fill="#f2f3f5" font-size="15" font-family="monospace">00:12.500</text>
  </g>

  <!-- mode + fps -->
  <rect x="16" y="350" width="728" height="36" rx="8" fill="#2b2d31" stroke="#3f4147"/>
  <rect x="24" y="356" width="156" height="28" rx="8" fill="#1e1f22"/>
  <rect x="27" y="359" width="74" height="22" rx="6" fill="#5865f2"/>
  <text x="44" y="374" fill="#fff" font-size="12" font-weight="600">Precise</text>
  <text x="112" y="374" fill="#949ba4" font-size="12" font-weight="600">Lossless</text>
  <text x="650" y="374" fill="#949ba4" font-size="11" font-weight="700">FPS</text>
  <rect x="682" y="358" width="52" height="24" rx="6" fill="#1e1f22" stroke="#3f4147"/>
  <text x="700" y="374" fill="#f2f3f5" font-size="12" font-family="monospace">30</text>

  <!-- advanced row 1: quality / speed / mute -->
  <rect x="16" y="390" width="728" height="34" rx="8" fill="#2b2d31" stroke="#3f4147"/>
  <rect x="24" y="394" width="150" height="26" rx="8" fill="#1e1f22"/>
  <rect x="27" y="397" width="46" height="20" rx="6" fill="#5865f2"/>
  <text x="38" y="411" fill="#fff" font-size="11" font-weight="600">High</text>
  <text x="84" y="411" fill="#949ba4" font-size="11" font-weight="600">Med</text>
  <text x="128" y="411" fill="#949ba4" font-size="11" font-weight="600">Low</text>

  <rect x="190" y="394" width="300" height="26" rx="8" fill="#1e1f22"/>
  <g font-size="11" font-weight="600" fill="#949ba4">
    <text x="204" y="411">.25×</text><text x="248" y="411">.5×</text>
    <rect x="286" y="397" width="40" height="20" rx="6" fill="#5865f2"/><text x="298" y="411" fill="#fff">1×</text>
    <text x="338" y="411">2×</text><text x="378" y="411">5×</text><text x="420" y="411">10×</text>
  </g>
  <rect x="512" y="399" width="14" height="14" rx="3" fill="#1e1f22" stroke="#5865f2"/>
  <text x="534" y="411" fill="#949ba4" font-size="12" font-weight="600">Mute preview</text>

  <!-- advanced row 2: audio boost + crop -->
  <rect x="16" y="428" width="728" height="36" rx="8" fill="#2b2d31" stroke="#3f4147"/>
  <text x="24" y="446" fill="#949ba4" font-size="11" font-weight="700">AUDIO BOOST</text>
  <rect x="120" y="441" width="180" height="6" rx="3" fill="#4e5058"/>
  <rect x="120" y="441" width="120" height="6" rx="3" fill="#5865f2"/>
  <circle cx="240" cy="444" r="7" fill="#fff"/>
  <text x="312" y="446" fill="#f2f3f5" font-size="12" font-family="monospace">180%</text>
  <rect x="372" y="432" width="86" height="24" rx="6" fill="#5865f2"/>
  <text x="386" y="448" fill="#fff" font-size="12" font-weight="600">Crop: on</text>
  <rect x="468" y="432" width="92" height="24" rx="6" fill="#2b2d31" stroke="#3f4147"/>
  <text x="482" y="448" fill="#dbdee1" font-size="12" font-weight="600">Reset crop</text>

  <!-- advanced row 3: color grading -->
  <rect x="16" y="468" width="728" height="32" rx="8" fill="#2b2d31" stroke="#3f4147"/>
  <g font-size="11" font-weight="700" fill="#949ba4">
    <text x="24" y="484">SAT</text>
    <rect x="58" y="479" width="120" height="6" rx="3" fill="#4e5058"/><rect x="58" y="479" width="78" height="6" rx="3" fill="#5865f2"/><circle cx="136" cy="482" r="7" fill="#fff"/><text x="188" y="484" fill="#f2f3f5" font-family="monospace">130</text>
    <text x="246" y="484">CON</text>
    <rect x="282" y="479" width="120" height="6" rx="3" fill="#4e5058"/><rect x="282" y="479" width="66" height="6" rx="3" fill="#5865f2"/><circle cx="348" cy="482" r="7" fill="#fff"/><text x="412" y="484" fill="#f2f3f5" font-family="monospace">110</text>
    <text x="470" y="484">BRI</text>
    <rect x="504" y="479" width="120" height="6" rx="3" fill="#4e5058"/><rect x="504" y="479" width="60" height="6" rx="3" fill="#5865f2"/><circle cx="564" cy="482" r="7" fill="#fff"/><text x="628" y="484" fill="#f2f3f5" font-family="monospace">100</text>
  </g>

  <!-- timeline -->
  <rect x="24" y="510" width="720" height="10" rx="5" fill="#4e5058"/>
  <rect x="160" y="510" width="420" height="10" fill="#5865f2"/>
  <rect x="154" y="503" width="12" height="24" rx="4" fill="#5865f2" stroke="#fff" stroke-width="2"/>
  <rect x="574" y="503" width="12" height="24" rx="4" fill="#5865f2" stroke="#fff" stroke-width="2"/>
  <rect x="300" y="506" width="2" height="18" fill="#fff"/>

  <!-- footer / actions -->
  <line x1="0" y1="548" x2="768" y2="548" stroke="#1e1f22" stroke-width="2"/>
  <rect x="0" y="548" width="768" height="52" rx="0" fill="#2b2d31"/>
  <rect x="566" y="560" width="124" height="32" rx="6" fill="#5865f2"/>
  <text x="588" y="581" fill="#fff" font-size="13" font-weight="600">Trim &amp; send</text>
  <text x="704" y="581" fill="#b5bac1" font-size="13" font-weight="600">Cancel</text>
</svg>
